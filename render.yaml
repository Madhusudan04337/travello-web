services:
  - type: web
    name: travello-web
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn travello_web.wsgi"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: travello-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: travello-db
    plan: free